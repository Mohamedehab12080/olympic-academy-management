<div class="types-container"><div class="page-header"><h1>أنواع الإيجار</h1><button mat-raised-button color="primary" routerLink="/financial/rent-types/new"><mat-icon>add</mat-icon> نوع جديد</button></div>
<mat-card><div class="filters"><mat-form-field appearance="outline" class="filter-field"><mat-label>بحث</mat-label><input matInput (keyup)="applyQuickSearch($event)" placeholder="بحث..."><mat-icon matSuffix>search</mat-icon></mat-form-field>
<button mat-stroked-button (click)="exportToExcel()"><mat-icon>table_chart</mat-icon> Excel</button><button mat-stroked-button color="warn" (click)="exportToPDF()"><mat-icon>picture_as_pdf</mat-icon> PDF</button></div>
<div class="loading" *ngIf="isLoading"><mat-spinner diameter="40"></mat-spinner></div>
<div class="table-container" *ngIf="!isLoading"><table mat-table [dataSource]="dataSource" matSort><ng-container matColumnDef="id"><th mat-header-cell *matHeaderCellDef>#</th><td mat-cell *matCellDef="let r">{{ r.id }}</td></ng-container>
<ng-container matColumnDef="title"><th mat-header-cell *matHeaderCellDef>الاسم</th><td mat-cell *matCellDef="let r">{{ r.title }}</td></ng-container>
<ng-container matColumnDef="description"><th mat-header-cell *matHeaderCellDef>الوصف</th><td mat-cell *matCellDef="let r">{{ r.description || '-' }}</td></ng-container>
<ng-container matColumnDef="createdOn"><th mat-header-cell *matHeaderCellDef>تاريخ الإنشاء</th><td mat-cell *matCellDef="let r">{{ r.createdOn | date:'dd/MM/yyyy' }}</td></ng-container>
<ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>الإجراءات</th><td mat-cell *matCellDef="let r"><button mat-icon-button color="primary" (click)="editType(r.id)"><mat-icon>edit</mat-icon></button><button mat-icon-button color="warn" (click)="deleteType(r)"><mat-icon>delete</mat-icon></button></td></ng-container>
<tr mat-header-row *matHeaderRowDef="displayedColumns"><tr><tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr></table>
<div class="no-data" *ngIf="dataSource.data.length===0"><mat-icon>category</mat-icon><p>لا توجد أنواع إيجار</p></div>
<mat-paginator [pageSize]="10" [pageSizeOptions]="[5,10,25,50]"></mat-paginator></div></mat-card></div>
