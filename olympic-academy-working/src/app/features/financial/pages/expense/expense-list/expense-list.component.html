<div class="expenses-container">
  <div class="page-header"><h1>المصروفات</h1><button mat-raised-button color="primary" routerLink="/financial/expenses/new"><mat-icon>add</mat-icon> مصروف جديد</button></div>
  <mat-card>
    <div class="filters">
      <mat-form-field appearance="outline" class="filter-field"><mat-label>بحث عام</mat-label><input matInput (keyup)="applyQuickSearch($event)" placeholder="بحث..."><mat-icon matSuffix>search</mat-icon></mat-form-field>
      <mat-form-field appearance="outline" class="filter-field"><mat-label>نوع المصروف</mat-label><mat-select [(ngModel)]="filters.expenseTypeId" (selectionChange)="loadData()"><mat-option [value]="null">الكل</mat-option><mat-option *ngFor="let t of expenseTypes" [value]="t.id">{{ t.title }}</mat-option></mat-select></mat-form-field>
      <mat-form-field appearance="outline" class="filter-field"><mat-label>طريقة الدفع</mat-label><mat-select [(ngModel)]="filters.paymentMethodId" (selectionChange)="loadData()"><mat-option [value]="null">الكل</mat-option><mat-option *ngFor="let p of paymentMethods" [value]="p.id">{{ p.title }}</mat-option></mat-select></mat-form-field>
      <mat-form-field appearance="outline" class="filter-field"><mat-label>من تاريخ</mat-label><input matInput [matDatepicker]="fromPicker" [(ngModel)]="filters.expenseDateFrom" (dateChange)="loadData()"><mat-datepicker-toggle matSuffix [for]="fromPicker"></mat-datepicker-toggle><mat-datepicker #fromPicker></mat-datepicker></mat-form-field>
      <mat-form-field appearance="outline" class="filter-field"><mat-label>إلى تاريخ</mat-label><input matInput [matDatepicker]="toPicker" [(ngModel)]="filters.expenseDateTo" (dateChange)="loadData()"><mat-datepicker-toggle matSuffix [for]="toPicker"></mat-datepicker-toggle><mat-datepicker #toPicker></mat-datepicker></mat-form-field>
      <button mat-stroked-button (click)="resetFilters()"><mat-icon>clear</mat-icon> مسح</button>
      <button mat-stroked-button color="accent" (click)="exportToExcel()"><mat-icon>table_chart</mat-icon> Excel</button>
      <button mat-stroked-button color="warn" (click)="exportToPDF()"><mat-icon>picture_as_pdf</mat-icon> PDF</button>
    </div>
    <div class="loading" *ngIf="isLoading"><mat-spinner diameter="40"></mat-spinner></div>
    <div class="table-container" *ngIf="!isLoading">
      <table mat-table [dataSource]="dataSource" matSort>
        <ng-container matColumnDef="id"><th mat-header-cell *matHeaderCellDef>#</th><td mat-cell *matCellDef="let e">{{ e.id }}</td></ng-container>
        <ng-container matColumnDef="expenseType"><th mat-header-cell *matHeaderCellDef>النوع</th><td mat-cell *matCellDef="let e">{{ e.expenseType?.title }}</td></ng-container>
        <ng-container matColumnDef="amountExpensed"><th mat-header-cell *matHeaderCellDef>المبلغ</th><td mat-cell *matCellDef="let e">{{ e.amountExpensed }} جم</td></ng-container>
        <ng-container matColumnDef="expenseDate"><th mat-header-cell *matHeaderCellDef>التاريخ</th><td mat-cell *matCellDef="let e">{{ e.expenseDate | date }}</td></ng-container>
        <ng-container matColumnDef="paymentMethod"><th mat-header-cell *matHeaderCellDef>طريقة الدفع</th><td mat-cell *matCellDef="let e">{{ e.paymentMethod?.title || '-' }}</td></ng-container>
        <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>الإجراءات</th><td mat-cell *matCellDef="let e"><button mat-icon-button color="primary" (click)="editExpense(e.id)"><mat-icon>edit</mat-icon></button><button mat-icon-button color="warn" (click)="deleteExpense(e)"><mat-icon>delete</mat-icon></button></td></ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      <div class="no-data" *ngIf="dataSource.data.length===0"><mat-icon>receipt</mat-icon><p>لا توجد مصروفات</p></div>
      <mat-paginator [pageSize]="10" [pageSizeOptions]="[5,10,25,50]"></mat-paginator>
    </div>
  </mat-card>
</div>
