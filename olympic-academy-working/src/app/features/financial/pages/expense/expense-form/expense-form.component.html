<div class="form-container"><mat-card><div class="form-header"><button mat-icon-button routerLink="/financial/expenses"><mat-icon>arrow_forward</mat-icon></button><h2>{{ isEditMode ? 'تعديل مصروف' : 'إضافة مصروف جديد' }}</h2></div>
<form [formGroup]="form" (ngSubmit)="onSubmit()"><div class="form-grid">
<mat-form-field appearance="outline" class="full-width"><mat-label>نوع المصروف *</mat-label><mat-select formControlName="expenseTypeId"><mat-option *ngFor="let t of expenseTypes" [value]="t.id">{{ t.title }}</mat-option></mat-select><mat-error *ngIf="form.get('expenseTypeId')?.hasError('required')">نوع المصروف مطلوب</mat-error></mat-form-field>
<mat-form-field appearance="outline"><mat-label>المبلغ *</mat-label><input matInput type="number" formControlName="amountExpensed" placeholder="أدخل المبلغ"><span matSuffix>جم</span><mat-error *ngIf="form.get('amountExpensed')?.hasError('required')">المبلغ مطلوب</mat-error><mat-error *ngIf="form.get('amountExpensed')?.hasError('min')">المبلغ يجب أن يكون أكبر من 0</mat-error></mat-form-field>
<mat-form-field appearance="outline"><mat-label>تاريخ المصروف *</mat-label><input matInput [matDatepicker]="datePicker" formControlName="expenseDate"><mat-datepicker-toggle matSuffix [for]="datePicker"></mat-datepicker-toggle><mat-datepicker #datePicker></mat-datepicker><mat-error *ngIf="form.get('expenseDate')?.hasError('required')">التاريخ مطلوب</mat-error></mat-form-field>
<mat-form-field appearance="outline"><mat-label>طريقة الدفع</mat-label><mat-select formControlName="paymentMethodId"><mat-option [value]="null">-- اختر --</mat-option><mat-option *ngFor="let p of paymentMethods" [value]="p.id">{{ p.title }}</mat-option></mat-select></mat-form-field>
<mat-form-field appearance="outline" class="full-width"><mat-label>ملاحظات</mat-label><textarea matInput formControlName="note" rows="3" placeholder="أي ملاحظات إضافية..."></textarea></mat-form-field>
</div><div class="form-actions"><button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || isSubmitting"><mat-spinner diameter="20" *ngIf="isSubmitting"></mat-spinner><mat-icon *ngIf="!isSubmitting">save</mat-icon>{{ isSubmitting ? 'جاري الحفظ...' : (isEditMode ? 'تحديث' : 'حفظ') }}</button><button mat-stroked-button type="button" routerLink="/financial/expenses"><mat-icon>close</mat-icon> إلغاء</button></div></form></mat-card></div>
