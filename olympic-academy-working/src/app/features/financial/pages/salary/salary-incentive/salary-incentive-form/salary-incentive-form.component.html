<div class="form-container">
  <mat-card>
    <div class="form-header">
      <button mat-icon-button routerLink="/financial/salary-incentives" matTooltip="رجوع">
        <mat-icon>arrow_forward</mat-icon>
      </button>
      <div class="header-info">
        <h2>{{ getFormTitle() }}</h2>
        <p class="subtitle" *ngIf="transactionTypeName">
          <span class="type-badge" [class.salary]="form.get('type')?.value?.id === 1"
                                   [class.incentive]="form.get('type')?.value?.id === 2"
                                   [class.bonus]="form.get('type')?.value?.id === 3"
                                   [class.advance]="form.get('type')?.value?.id === 4">
            {{ transactionTypeName }}
          </span>
        </p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <!-- الموظف -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>الموظف *</mat-label>
          <mat-select formControlName="employeeId">
            <mat-option *ngFor="let e of employees" [value]="e.id">{{ e.title }}</mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('employeeId')?.hasError('required')">الموظف مطلوب</mat-error>
        </mat-form-field>

        <!-- نوع المعاملة -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>نوع المعاملة *</mat-label>
          <mat-select formControlName="type">
            <mat-option *ngFor="let t of transactionTypes" [value]="t">
              {{ t.title }}
            </mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('type')?.hasError('required')">نوع المعاملة مطلوب</mat-error>
        </mat-form-field>

        <!-- المبلغ -->
        <mat-form-field appearance="outline">
          <mat-label>المبلغ *</mat-label>
          <input matInput type="number" formControlName="amountWithdrawn" placeholder="أدخل المبلغ">
          <span matSuffix>جم</span>
          <mat-error *ngIf="form.get('amountWithdrawn')?.hasError('required')">المبلغ مطلوب</mat-error>
          <mat-error *ngIf="form.get('amountWithdrawn')?.hasError('min')">المبلغ يجب أن يكون أكبر من 0</mat-error>
        </mat-form-field>

        <!-- تاريخ الصرف -->
        <mat-form-field appearance="outline">
          <mat-label>تاريخ الصرف *</mat-label>
          <input matInput [matDatepicker]="datePicker" formControlName="withdrawDate">
          <mat-datepicker-toggle matSuffix [for]="datePicker"></mat-datepicker-toggle>
          <mat-datepicker #datePicker></mat-datepicker>
          <mat-error *ngIf="form.get('withdrawDate')?.hasError('required')">تاريخ الصرف مطلوب</mat-error>
        </mat-form-field>

        <!-- طريقة الدفع -->
        <mat-form-field appearance="outline">
          <mat-label>طريقة الدفع</mat-label>
          <mat-select formControlName="paymentMethodId">
            <mat-option [value]="null">-- اختر --</mat-option>
            <mat-option *ngFor="let p of paymentMethods" [value]="p.id">{{ p.title }}</mat-option>
          </mat-select>
        </mat-form-field>

        <!-- نوع الراتب -->
        <mat-form-field appearance="outline">
          <mat-label>نوع الراتب</mat-label>
          <mat-select formControlName="salaryType">
            <mat-option [value]="null">-- اختر --</mat-option>
            <mat-option *ngFor="let s of salaryTypes" [value]="s">{{ s.title }}</mat-option>
          </mat-select>
        </mat-form-field>

        <!-- ملاحظات -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>ملاحظات</mat-label>
          <textarea matInput formControlName="note" rows="3" placeholder="أي ملاحظات إضافية..."></textarea>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          <mat-icon>save</mat-icon>
          {{ isEditMode ? 'تحديث' : 'حفظ' }}
        </button>
        <button mat-stroked-button type="button" routerLink="/financial/salary-incentives">
          <mat-icon>close</mat-icon>
          إلغاء
        </button>
      </div>
    </form>
  </mat-card>
</div>
