<div class="forgot-container">
  <mat-card class="forgot-card">
    <div class="forgot-header">
      <mat-icon class="logo-icon">sports_score</mat-icon>
      <h1>نسيت كلمة المرور؟</h1>
      <p>أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة التعيين</p>
    </div>

    <div *ngIf="!isSubmitted; else successState">
      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>البريد الإلكتروني</mat-label>
          <input matInput formControlName="email" type="email">
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="forgotForm.get('email')?.hasError('required')">البريد الإلكتروني مطلوب</mat-error>
          <mat-error *ngIf="forgotForm.get('email')?.hasError('email')">بريد إلكتروني غير صحيح</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="submit-btn" [disabled]="isLoading">
          <mat-icon *ngIf="!isLoading">send</mat-icon>
          <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
          <span>{{ isLoading ? 'جاري الإرسال...' : 'إرسال رابط إعادة التعيين' }}</span>
        </button>

        <div class="login-link">
          <a routerLink="/login">العودة إلى تسجيل الدخول</a>
        </div>
      </form>
    </div>

    <ng-template #successState>
      <div class="success-state">
        <mat-icon class="success-icon">check_circle</mat-icon>
        <h2>تم الإرسال!</h2>
        <p>تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني. يرجى التحقق من صندوق الوارد.</p>
        <button mat-raised-button color="primary" (click)="goToLogin()">
          <mat-icon>login</mat-icon> العودة إلى تسجيل الدخول
        </button>
      </div>
    </ng-template>
  </mat-card>
</div>
