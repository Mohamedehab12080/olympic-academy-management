openapi: 3.0.3
info:
  version: "1.0"
  title: "Common Library"
  contact:
    email: "m.ehab.rabea@gmail.com"
    name: "Mohamed Ehab"

paths:
  { }

components:
  responses:
    Created:
      description: Created
    NoContent:
      description: No Content
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '../../../common/_swagger/service/swagger.yaml#/components/schemas/ErrorVTO'

  parameters:
    QPQuickSearch:
      name: quickSearch
      in: query
      required: false
      schema:
        type: string

    QPCreatedOnFrom:
      name: createdOnFrom
      in: query
      schema:
        type: string
        format: date

    QPCreatedOnTo:
      name: createdOnTo
      in: query
      schema:
        type: string
        format: date

    QPLastModifiedOnFrom:
      name: lastModifiedOnFrom
      in: query
      schema:
        type: string
        format: date

    QPLastModifiedOnTo:
      name: lastModifiedOnTo
      in: query
      schema:
        type: string
        format: date

    QPExecutedOnFrom:
      name: executedOnFrom
      in: query
      schema:
        type: string
        format: date

    QPExecutedOnTo:
      name: executedOnTo
      in: query
      schema:
        type: string
        format: date

    QPIsActive:
      name: isActive
      in: query
      schema:
        type: boolean

  schemas:
    Gender:
      type: object
      properties:
        id:
          type: integer
          enum: [ 1, 2 ]
        code:
          type: string
          enum: [ "MALE", "FEMALE" ]
        arabicLabel:
          type: string
          enum: [ "ذكر", "أنثى" ]

    PaymentStatus:
      type: object
      properties:
        id:
          type: integer
          enum: [ 1, 2,3,4,5 ]
        code:
          type: string
          enum: [ "PENDING","PAID","FAILED","REFUNDED","CANCELLED"]
        arabicLabel:
          type: string
          enum: [ "قيد الانتظار", "تم الدفع","فشل","تم استرداد المبلغ","تم الالغاء" ]

    ContactTypes:
      type: object
      properties:
        id:
          type: integer
          enum: [1, 2]
        code:
          type: string
          enum: ["EMAIL", "PHONE"]
        arabicLabel:
          type: string
          enum: ["ايميل", "هاتف"]

    ErrorVTO:
      type: object
      properties:
        code:
          type: string
        messageEn:
          type: string
        reqBodyErrors:
          type: array
          items:
            type: string

    LookupVTO:
      type: object
      properties:
        id:
          type: integer
          format: int32
        title:
          type: string
        imageUrl:
          type: string

    NewRecordVTO:
      type: object
      properties:
        id:
          type: integer
          format: int32

    LookupDTO:
      type: object
      required:
        - titleEn
      properties:
        titleAr:
          type: string
        titleEn:
          type: string
          minLength: 1

    LookupResultSet:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/LookupVTO'
        total:
          type: integer
          format: int32

    RecordAttribute:
      type: object
      required:
        - attributeKey
        - attributeValue
      properties:
        attributeKey:
          type: string
        attributeValue:
          type: string