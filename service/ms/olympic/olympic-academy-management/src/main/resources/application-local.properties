management.endpoint.logfile.enabled=false

# -------------------------------------------------------------------
# LIQUIBASE
# -------------------------------------------------------------------
spring.liquibase.enabled=false

# -------------------------------------------------------------------
# Jackson Configuration
# -------------------------------------------------------------------
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Africa/Cairo

# -------------------------------------------------------------------
# External API Configuration
# -------------------------------------------------------------------
external.api.countries.url=https://restcountries.com/v3.1
external.api.timeout=5000

# -------------------------------------------------------------------
# Email Configuration
# -------------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=m.ehab.rabea@gmail.com
spring.mail.password=dltkdakmdzaujvwc
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
