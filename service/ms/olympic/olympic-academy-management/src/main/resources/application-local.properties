# ===================================================================
# OLYMPIC ACADEMY - LOCAL DEVELOPMENT CONFIGURATION
# ===================================================================
# This file overrides application.properties when running with:
# --spring.profiles.active=local
# ===================================================================

# -------------------------------------------------------------------
# Database Configuration - LOCAL ONLY
# -------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/olympic_academy_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Cairo
spring.datasource.username=root
spring.datasource.password=25251436
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=6
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000

# -------------------------------------------------------------------
# JPA Configuration - LOCAL ONLY
# -------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Performance optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# -------------------------------------------------------------------
# LOGGING - CONSOLE ONLY (NO FILE)
# -------------------------------------------------------------------

# Root logging level
logging.level.root=INFO

# Application logging
logging.level.bs=DEBUG
logging.level.bs.service=DEBUG
logging.level.bs.service.employee.scheduler=DEBUG
logging.level.bs.service.ms.olympic.academy.config=DEBUG

# Spring Framework logging
logging.level.org.springframework=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.scheduling=DEBUG
logging.level.org.springframework.scheduling.annotation=DEBUG
logging.level.org.springframework.boot.SpringApplication=DEBUG
logging.level.org.springframework.boot.web.embedded.tomcat=DEBUG

# Hibernate logging
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.engine.transaction=DEBUG

# Connection pool logging
logging.level.com.zaxxer.hikari=DEBUG

# Console logging pattern with full details and colors
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n

# ================================================================
# FILE LOGGING DISABLED - FIX FOR FILE LOCK ISSUE
