# -------------------------------------------------------------------
# Application Settings
# -------------------------------------------------------------------
app.base.url=http://localhost:7002
app.production=false

# Performance settings
app.performance.max-query-timeout=30000
app.performance.page-size=20
app.performance.max-page-size=50

# -------------------------------------------------------------------
# Scheduler Configuration
# -------------------------------------------------------------------
token.cleanup.fixed-rate=3600000
spring.task.scheduling.enabled=true
spring.task.scheduling.pool.size=1
spring.task.scheduling.thread-name-prefix=token-cleanup-

# Backup Configuration
backup.enabled=true
backup.interval.days=30
backup.mysqldump.path=C:\\Program Files\\MySQL\\MySQL Server 8.0\\bin\\mysqldump.exe

# -------------------------------------------------------------------
# Thymeleaf Configuration
# -------------------------------------------------------------------
spring.thymeleaf.enabled=true
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# -------------------------------------------------------------------
# File Upload Configuration
# -------------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB

# -------------------------------------------------------------------
# Dev Tools - LOCAL ONLY
# -------------------------------------------------------------------
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.jmx.enabled=false

# -------------------------------------------------------------------
# Actuator - Full endpoints for local
# -------------------------------------------------------------------
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.metrics.export.simple.enabled=true