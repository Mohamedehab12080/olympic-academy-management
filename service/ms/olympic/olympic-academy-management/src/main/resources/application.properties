# ===================================================================
# OLYMPIC ACADEMY - MAIN CONFIGURATION
# ===================================================================

# -------------------------------------------------------------------
# Server Configuration
# -------------------------------------------------------------------
spring.application.name=olympic-academy-management
server.port=7002

# Activate local profile by default
spring.profiles.active=local

# Server Error Handling
server.error.include-message=always
server.error.include-binding-errors=always

# -------------------------------------------------------------------
# Database Configuration (overridden by profile-specific files)
# -------------------------------------------------------------------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Settings (overridden by profile-specific files)
spring.datasource.hikari.maximum-pool-size=6
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000

# -------------------------------------------------------------------
# JPA Configuration (overridden by profile-specific files)
# -------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# -------------------------------------------------------------------
# LIQUIBASE
# -------------------------------------------------------------------
spring.liquibase.enabled=false

# -------------------------------------------------------------------
# LOGGING (overridden by profile-specific files)
# -------------------------------------------------------------------
logging.level.root=INFO
logging.level.bs=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# -------------------------------------------------------------------
# SCHEDULER
# -------------------------------------------------------------------
spring.task.scheduling.enabled=true
spring.task.scheduling.pool.size=1

# -------------------------------------------------------------------
# JACKSON
# -------------------------------------------------------------------
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Africa/Cairo

# -------------------------------------------------------------------
# FILE UPLOAD
# -------------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB

# -------------------------------------------------------------------
# ACTUATOR
# -------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,logfile
management.endpoint.logfile.enabled=true

# -------------------------------------------------------------------
# BACKUP CONFIGURATION
# -------------------------------------------------------------------
backup.enabled=true
backup.interval.days=30
backup.mysqldump.path=C:\\Program Files\\MySQL\\MySQL Server 8.0\\bin\\mysqldump.exe