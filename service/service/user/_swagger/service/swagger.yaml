openapi: 3.0.3
info:
  version: "1.0"
  title: "Common Library"
  contact:
    email: "m.ehab.rabea@gmail.com"
    name: "Mohamed Ehab"

paths:
  {}
components:
  parameters:
    QPCreatedById:
      name: createdById
      in: query
      schema:
        type: integer
        format: int32

    QPUserId:
      name: userId
      in: query
      schema:
        type: integer
        format: int32

    PPUserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int32

  schemas:
    LightUserVTO:
      type: object
      properties:
        id:
          type: integer
          format: int32
        nationalId:
          type: integer
          format: int32
        imageUrl:
          type: string
        fullName:
          type: string

    LightUserResultSet:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/LightUserVTO'
        total:
          type: integer
          format: int32