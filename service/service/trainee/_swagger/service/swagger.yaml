openapi: 3.0.3
info:
  version: "1.0"
  title: "Trainee Management"
  contact:
    email: "m.ehab.rabea@gmail.com"
    name: "Mohamed Ehab"

servers:
  - url: http://localhost:7002/

tags:
  - name: Trainee
  - name: TraineeContact
  - name: TraineeCertificate
  - name: HealthCondition
  - name: TraineeAttendance
  - name: TraineeLookup

paths:
  # ==================== Trainee Endpoints ====================
  /trainees:
    post:
      tags:
        - Trainee
      summary: Create trainee
      operationId: createTrainee
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraineeDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - Trainee
      summary: Retrieve list of Trainees
      operationId: getAllTraineesByFilter
      parameters:
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPQuickSearch'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPIsActive'
        - $ref: '#/components/parameters/QPGender'
        - $ref: '#/components/parameters/QPAcademicYear'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPCreatedOnFrom'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPCreatedOnTo'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainees/{traineeId}:
    put:
      tags:
        - Trainee
      summary: Update Trainee By Id
      operationId: updateTrainee
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraineeDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - Trainee
      summary: Retrieve trainee
      operationId: getTraineeById
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    delete:
      tags:
        - Trainee
      summary: Delete trainee (soft delete)
      operationId: deleteTraineeById
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
      responses:
        '200':
          description: OK
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  # ==================== Trainee Contact Endpoints ====================
  /trainees/{traineeId}/contacts:
    post:
      tags:
        - TraineeContact
      summary: Create trainee contact
      operationId: createTraineeContact
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraineeContactDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - TraineeContact
      summary: Get all trainee contacts
      operationId: getTraineeContacts
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
        - $ref: '#/components/parameters/QPContactValue'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeContactResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainees/{traineeId}/contacts/{contactId}:
    put:
      tags:
        - TraineeContact
      summary: Update trainee contact
      operationId: updateTraineeContact
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
        - $ref: '#/components/parameters/PPContactId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraineeContactDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    delete:
      tags:
        - TraineeContact
      summary: Delete trainee contact
      operationId: deleteTraineeContact
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
        - $ref: '#/components/parameters/PPContactId'
      responses:
        '200':
          description: OK
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  # ==================== Trainee Certificate Endpoints ====================
  /trainees/{traineeId}/certificates:
    post:
      tags:
        - TraineeCertificate
      summary: Create trainee certificate
      operationId: createTraineeCertificate
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraineeCertificateDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - TraineeCertificate
      summary: Get all trainee certificates by filter
      operationId: getAllTraineeCertificatesByFilter
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
        - $ref: '#/components/parameters/QPCourseId'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPQuickSearch'
        - $ref: '#/components/parameters/QPIssueDateFrom'
        - $ref: '#/components/parameters/QPIssueDateTo'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeCertificateResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainees/{traineeId}/certificates/{certificateId}:
    put:
      tags:
        - TraineeCertificate
      summary: Update trainee certificate
      operationId: updateTraineeCertificate
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
        - $ref: '#/components/parameters/PPCertificateId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraineeCertificateDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    delete:
      tags:
        - TraineeCertificate
      summary: Delete trainee certificate
      operationId: deleteTraineeCertificate
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
        - $ref: '#/components/parameters/PPCertificateId'
      responses:
        '200':
          description: OK
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  # ==================== Health Condition Endpoints ====================
  /trainees/{traineeId}/health-conditions:
    post:
      tags:
        - HealthCondition
      summary: Create health condition
      operationId: createHealthCondition
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthConditionDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - HealthCondition
      summary: Get all health conditions by filter
      operationId: getAllHealthConditionsByFilter
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPQuickSearch'
        - $ref: '#/components/parameters/QPMedication'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthConditionResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainees/{traineeId}/health-conditions/{conditionId}:
    put:
      tags:
        - HealthCondition
      summary: Update health condition
      operationId: updateHealthCondition
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
        - $ref: '#/components/parameters/PPConditionId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthConditionDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    delete:
      tags:
        - HealthCondition
      summary: Delete health condition
      operationId: deleteHealthCondition
      parameters:
        - $ref: '#/components/parameters/PPTraineeId'
        - $ref: '#/components/parameters/PPConditionId'
      responses:
        '200':
          description: OK
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  # ==================== Trainee Attendance Endpoints ====================
  /trainee-attendances:
    post:
      tags:
        - TraineeAttendance
      summary: Create trainee attendance record
      operationId: createTraineeAttendance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraineeAttendanceDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - TraineeAttendance
      summary: Retrieve list of trainee attendances with filters
      operationId: getAllTraineeAttendances
      parameters:
        - name: traineeId
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: courseId
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: courseSessionId
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TraineeAttendanceStatus'
        - $ref: '../../../../../service/service/employee/_swagger/service/swagger.yaml#/components/parameters/QPCheckInFrom'
        - $ref: '../../../../../service/service/employee/_swagger/service/swagger.yaml#/components/parameters/QPCheckInTo'
        - $ref: '../../../../../service/service/employee/_swagger/service/swagger.yaml#/components/parameters/QPCheckOutFrom'
        - $ref: '../../../../../service/service/employee/_swagger/service/swagger.yaml#/components/parameters/QPCheckOutTo'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPFromDate'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPToDate'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeAttendanceResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainees/attendances/reports/daily:
    get:
      tags:
        - TraineeAttendance
      summary: Get daily attendance report
      operationId: getDailyTraineeAttendanceReport
      parameters:
        - $ref: '../../../../../service/service/employee/_swagger/service/swagger.yaml#/components/parameters/QPAttendanceDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyAttendanceReport'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainee-attendances/{attendanceId}:
    put:
      tags:
        - TraineeAttendance
      summary: Update trainee attendance record
      operationId: updateTraineeAttendance
      parameters:
        - $ref: '#/components/parameters/PPAttendanceId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraineeAttendanceDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - TraineeAttendance
      summary: Get trainee attendance by id
      operationId: getTraineeAttendanceById
      parameters:
        - $ref: '#/components/parameters/PPAttendanceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeAttendanceVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    delete:
      tags:
        - TraineeAttendance
      summary: Delete trainee attendance record (soft delete)
      operationId: deleteTraineeAttendance
      parameters:
        - $ref: '#/components/parameters/PPAttendanceId'
      responses:
        '200':
          description: OK
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainee-attendances/batch:
    post:
      tags:
        - TraineeAttendance
      summary: Batch create trainee attendance records for a session
      operationId: batchCreateTraineeAttendance
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/TraineeAttendanceDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainee-attendances/session/{sessionId}/report:
    get:
      tags:
        - TraineeAttendance
      summary: Get attendance report for a specific session
      operationId: getSessionAttendanceReport
      parameters:
        - $ref: '#/components/parameters/PPSessionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionAttendanceReport'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /lookup/trainees:
    get:
      tags:
        - TraineeLookup
      summary: Get all trainees lookup
      operationId: getAllTraineesLookup
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeLookupResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /lookup/trainee/attendance/status:
    get:
      tags:
        - TraineeLookup
      summary: Get all trainee attendance statuses for lookup
      operationId: getTraineeAttendanceStatusLookup
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/LookupResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

components:
  parameters:
    PPTraineeId:
      name: traineeId
      in: path
      required: true
      schema:
        type: integer
        format: int32
    QPContactValue:
      name: contactValue
      in: query
      required: true
      schema:
        type: string
    PPContactId:
      name: contactId
      in: path
      required: true
      schema:
        type: integer
        format: int32
    PPCertificateId:
      name: certificateId
      in: path
      required: true
      schema:
        type: integer
        format: int32
    PPConditionId:
      name: conditionId
      in: path
      required: true
      schema:
        type: integer
        format: int32
    QPGender:
      name: gender
      in: query
      required: false
      schema:
        $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/Gender'
    QPAcademicYear:
      name: academicYear
      in: query
      required: false
      schema:
        type: string
    QPCourseId:
      name: courseId
      in: query
      required: false
      schema:
        type: integer
        format: int32
    QPIssueDateFrom:
      name: issueDateFrom
      in: query
      required: false
      schema:
        type: string
        format: date
    QPIssueDateTo:
      name: issueDateTo
      in: query
      required: false
      schema:
        type: string
        format: date
    QPMedication:
      name: medication
      in: query
      required: false
      schema:
        type: string
    PPAttendanceId:
      name: attendanceId
      in: path
      required: true
      schema:
        type: integer
        format: int32
    PPSessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: integer
        format: int32

  schemas:
    # ==================== Enums ====================

    TraineeAttendanceStatus:
      type: object
      properties:
        id:
          type: integer
          enum: [1, 2, 3, 4]
        code:
          type: string
          enum: ["PRESENT", "ABSENT", "LATE", "EXCUSED"]
        arabicLabel:
          type: string
          enum: ["حاضر", "غائب", "متأخر", "معذور"]


    # ==================== DTOs ====================
    TraineeDTO:
      type: object
      required:
        - fullName
        - nationalId
      properties:
        fullName:
          type: string
        nationalId:
          type: string
        academicYear:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/Gender'
        address:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/TraineeContactDTO'

    TraineeContactDTO:
      type: object
      properties:
        contactType:
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/ContactTypes'
        contactValue:
          type: string

    TraineeCertificateDTO:
      type: object
      properties:
        certificateNumber:
          type: string
        certificateName:
          type: string
        courseId:
          type: integer
          format: int32
        issueDate:
          type: string
          format: date
        grade:
          type: string

    HealthConditionDTO:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        medication:
          type: string
        note:
          type: string

    TraineeAttendanceDTO:
      type: object
      required:
        - courseSessionId
        - traineeId
        - status
      properties:
        courseSessionId:
          type: integer
          format: int32
          description: "ID of the course session"
        traineeId:
          type: integer
          format: int32
          description: "ID of the trainee"
        status:
          $ref: '#/components/schemas/TraineeAttendanceStatus'
        attendanceDate:
          type: string
          format: date
        checkInTime:
          type: string
          format: time
          description: "Check in time (HH:MM:SS)"
        checkOutTime:
          type: string
          format: time
          description: "Check out time (HH:MM:SS)"
        lateTime:
          type: integer
          format: int32
          description: "Late time in minutes"
        note:
          type: string
          description: "Additional notes"

    # ==================== VTOs ====================
    TraineeLookupResultSet:
      type: object
      properties:
        total:
          type: integer
          format: int32
        _list:
          type: array
          items:
            $ref: '#/components/schemas/TraineeLookupVTO'

    TraineeLookupVTO:
      type: object
      properties:
        id:
          type: integer
          format: int32
        title:
          type: string
        nationalId:
          type: string
        imageUrl:
          type: string

    TraineeVTO:
      type: object
      properties:
        id:
          type: integer
          format: int32
        fullName:
          type: string
        nationalId:
          type: string
