                  $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /courses/course-session/day/trainers:
    put:
      tags:
        - CourseSession
      summary: Update sessions for a specific day and trainers
      operationId: updateSessionsByDayAndTrainer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseSessionDayDTO'
        required: true
