openapi: 3.0.3
info:
  version: "1.0"
  title: "Employee Management"
  contact:
    email: "m.ehab.rabea@gmail.com"
    name: "Mohamed Ehab"

servers:
  - url: http://localhost:7002/

tags:
  - name: Employee
  - name: EmployeeContact
  - name: EmployeeAttendance
  - name: Lookup

paths:

  /lookup/employee/attendance/status:
    get:
      tags:
        - Lookup
      summary: Retrieve All Employee Attendance Status (public)
      operationId: getAllEmployeeAttendanceStatusLookup
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/LookupResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /lookup/employee/types:
    get:
      tags:
        - Lookup
      summary: Retrieve All Employee Types (public)
      operationId: getAllEmployeeTypesLookup
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/LookupResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /lookup/employees:
    get:
      tags:
        - Lookup
      summary: Retrieve All Employees (public)
      operationId: getAllEmployeesLookup
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/LookupResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees:
    post:
      tags:
        - Employee
      summary: Create employee
      operationId: createEmployee
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - Employee
      summary: Retrieve list of Employees
      operationId: getAllEmployees
      parameters:
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPQuickSearch'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPIsActive'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPCreatedOnFrom'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPCreatedOnTo'
        - $ref: '#/components/parameters/QPHireDateFrom'
        - $ref: '#/components/parameters/QPHireDateTo'
        - $ref: '#/components/parameters/QPGender'
        - $ref: '#/components/parameters/QPEmployeeType'
        - $ref: '#/components/parameters/QPSalaryType'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees/{employeeId}:
    put:
      tags:
        - Employee
      summary: Update Employee By Id
      operationId: updateEmployeeById
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - Employee
      summary: Retrieve employee
      operationId: getEmployee
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    delete:
      tags:
        - Employee
      summary: Delete employee (soft delete)
      operationId: deleteEmployee
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
      responses:
        '200':
          description: OK
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees/contacts:
    get:
      tags:
        - EmployeeContact
      summary: Retrieve list of employee contacts
      operationId: getAllEmployeeContacts
      parameters:
        - $ref: '#/components/parameters/QPEmployeeId'
        - $ref: '#/components/parameters/QPContactName'
        - $ref: '#/components/parameters/QPContactValue'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAttendanceResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees/{employeeId}/contacts/{contactId}:
    put:
      tags:
        - EmployeeContact
      summary: Update Employee Contact
      operationId: updateEmployeeContact
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
        - $ref: '#/components/parameters/PPContactId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeContactDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees/{employeeId}/attendances:
    post:
      tags:
        - EmployeeAttendance
      summary: Create employee attendance record
      operationId: createEmployeeAttendance
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeAttendanceDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - EmployeeAttendance
      summary: Retrieve list of employee attendances
      operationId: getAllEmployeeAttendances
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
        - $ref: '#/components/parameters/QPEmployeeAttendanceStatus'
        - $ref: '#/components/parameters/QPAttendanceDateFrom'
        - $ref: '#/components/parameters/QPAttendanceDateTo'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAttendanceResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees/{employeeId}/attendances/{attendanceId}:
    put:
      tags:
        - EmployeeAttendance
      summary: Update employee attendance record
      operationId: updateEmployeeAttendance
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
        - $ref: '#/components/parameters/PPAttendanceId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeAttendanceDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - EmployeeAttendance
      summary: Retrieve employee attendance record
      operationId: getEmployeeAttendance
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
        - $ref: '#/components/parameters/PPAttendanceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAttendanceVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    delete:
      tags:
        - EmployeeAttendance
      summary: Delete employee attendance record (soft delete)
      operationId: deleteEmployeeAttendance
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
        - $ref: '#/components/parameters/PPAttendanceId'
      responses:
        '200':
          description: OK
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /attendances/reports/daily:
    get:
      tags:
        - EmployeeAttendance
      summary: Get daily attendance report
      operationId: getDailyAttendanceReport
      parameters:
        - $ref: '#/components/parameters/QPAttendanceDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyAttendanceReport'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

components:
  parameters:
    PPEmployeeId:
      name: employeeId
      in: path
      required: true
      schema:
        type: integer
        format: int32
    PPContactId:
      name: contactId
      in: path
      required: true
      schema:
        type: integer
        format: int32
    PPAttendanceId:
      name: attendanceId
      in: path
      required: true
      schema:
        type: integer
        format: int32

    QPContactName:
      name: contactName
      in: query
      required: false
      schema:
        type: string

    QPContactValue:
      name: contactValue
      in: query
      required: false
      schema:
        type: string

    QPEmployeeId:
      name: employeeId
      in: query
      required: false
      schema:
        type: integer
        format: int32

    QPGender:
      name: gender
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Gender'
    QPEmployeeType:
      name: employeeType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/EmployeeTypes'
    QPSalaryType:
      name: salaryType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/SalaryTypes'
    QPHireDateFrom:
      name: hireDateFrom
      in: query
      required: false
      schema:
        type: string
        format: date
    QPHireDateTo:
      name: hireDateTo
      in: query
      required: false
      schema:
        type: string
        format: date
    QPEmployeeAttendanceStatus:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/EmployeeAttendanceStatus'
    QPAttendanceDateFrom:
      name: attendanceDateFrom
      in: query
      required: false
      schema:
        type: string
        format: date
    QPAttendanceDateTo:
      name: attendanceDateTo
      in: query
      required: false
      schema:
        type: string
        format: date
    QPAttendanceDate:
      name: attendanceDate
      in: query
      required: true
      schema:
        type: string
        format: date

  schemas:
    Gender:
      type: object
      properties:
        id:
          type: integer
          enum: [1, 2]
        code:
          type: string
          enum: ["MALE", "FEMALE"]
        arabicLabel:
          type: string
          enum: ["ذكر", "أنثى"]

    EmployeeTypes:
      type: object
      properties:
        id:
          type: integer
          enum: [1, 2]
        code:
          type: string
          enum: ["TRAINER", "MANAGER"]
        arabicLabel:
          type: string
          enum: ["مدرب", "مدير"]

    SalaryTypes:
      type: object
      properties:
        id:
          type: integer
          enum: [1, 2, 3, 4]
        code:
          type: string
          enum: ["MONTHLY", "DAILY", "HOURLY", "PERCENTAGE"]
        arabicLabel:
          type: string
          enum: ["شهري", "يومي", "بالساعة", "نسبة"]

    EmployeeAttendanceStatus:
      type: object
      properties:
        id:
          type: integer
          enum: [1, 2, 3, 4]
        code:
          type: string
          enum: ["PRESENT", "ABSENT", "LATE", "EXCUSED"]
        arabicLabel:
          type: string
          enum: ["حاضر", "غائب", "متأخر", "معذور"]

    ContactTypes:
      type: object
      properties:
        id:
          type: integer
          enum: [1, 2]
        code:
          type: string
          enum: ["EMAIL", "PHONE"]
        arabicLabel:
          type: string
          enum: ["ايميل", "هاتف"]

    EmployeeDTO:
      type: object
      required:
        - fullName
        - nationalId
        - employeeType
        - departmentIds
        - contacts
      properties:
        fullName:
          type: string
        nationalId:
          type: string
          minLength: 14
          maxLength: 14
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        salary:
          type: integer
          format: int32
        remainedSalary:
          type: integer
          format: int32
        salaryType:
          $ref: '#/components/schemas/SalaryTypes'
        employeeType:
          $ref: '#/components/schemas/EmployeeTypes'
        imageUrl:
          type: string
        hireDate:
          type: string
          format: date
        departmentIds:
          type: array
          items:
            type: integer
            format: int32
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeContactDTO'

    EmployeeContactDTO:
      type: object
      properties:
        contactType:
          type: string
        contactValue:
          type: string

    EmployeeAttendanceDTO:
      type: object
      required:
        - attendanceDate
        - status
        - checkInTime
      properties:
        attendanceDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/EmployeeAttendanceStatus'
        checkInTime:
          type: string
          format: time
        checkOutTime:
          type: string
          format: time
        lateTime:
          type: integer
          format: int32
          description: "Late time in minutes"
        note:
          type: string

    EmployeeVTO:
      type: object
      properties:
        id:
          type: integer
          format: int32
        fullName:
          type: string
        nationalId:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        salary:
          type: integer
          format: int32
        remainedSalary:
          type: integer
          format: int32
        salaryType:
          $ref: '#/components/schemas/SalaryTypes'
        employeeType:
          $ref: '#/components/schemas/EmployeeTypes'
        imageUrl:
          type: string
        hireDate:
          type: string
          format: date
        isActive:
          type: boolean
        departments:
          type: array
          items:
            $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/LookupVTO'
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeContactVTO'
        createdOn:
          type: string
          format: date-time
        createdBy:
          $ref: '../../../../../service/service/user/_swagger/service/swagger.yaml#/components/schemas/LightUserVTO'
        lastModifiedOn:
          type: string
          format: date-time
        lastModifiedBy:
          $ref: '../../../../../service/service/user/_swagger/service/swagger.yaml#/components/schemas/LightUserVTO'

    EmployeeContactVTO:
      type: object
      properties:
        id:
          type: integer
          format: int32
        contactType:
          type: string
        contactValue:
          type: string

    EmployeeAttendanceVTO:
      type: object
      properties:
        id:
          type: integer
          format: int32
        employee:
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/LookupVTO'
        attendanceDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/EmployeeAttendanceStatus'
        checkInTime:
          type: string
          format: time
        checkOutTime:
          type: string
          format: time
        lateTime:
          type: integer
          format: int32
        note:
          type: string
        createdOn:
          type: string
          format: date-time
        createdBy:
          $ref: '../../../../../service/service/user/_swagger/service/swagger.yaml#/components/schemas/LightUserVTO'
        lastModifiedOn:
          type: string
          format: date-time
        lastModifiedBy:
          $ref: '../../../../../service/service/user/_swagger/service/swagger.yaml#/components/schemas/LightUserVTO'

    EmployeeResultSet:
      type: object
      properties:
        total:
          type: integer
          format: int32
        items:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeListItem'

    EmployeeListItem:
      type: object
      properties:
        id:
          type: integer
          format: int32
        fullName:
          type: string
        nationalId:
          type: string
        gender:
          $ref: '#/components/schemas/Gender'
        employeeType:
          $ref: '#/components/schemas/EmployeeTypes'
        hireDate:
          type: string
          format: date
        isActive:
          type: boolean
        departments:
          type: array
          items:
            $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/LookupVTO'

    EmployeeContactResultSet:
      type: object
      properties:
        total:
          type: integer
          format: int32
        items:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeContactListItem'


    EmployeeAttendanceResultSet:
      type: object
      properties:
        total:
          type: integer
          format: int32
        items:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeAttendanceListItem'

    EmployeeContactListItem:
      type: object
      properties:
        id:
          type: integer
          format: int32
        contactName:
          type: string
        contactValue:
          type: string
        contactType:
          $ref: '#/components/schemas/ContactTypes'

    EmployeeAttendanceListItem:
      type: object
      properties:
        id:
          type: integer
          format: int32
        employee:
          $ref: '../../../../../service/service/user/_swagger/service/swagger.yaml#/components/schemas/LightUserVTO'
        attendanceDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/EmployeeAttendanceStatus'
        checkInTime:
          type: string
          format: time
        checkOutTime:
          type: string
          format: time
        lateTime:
          type: integer
          format: int32

    DailyAttendanceReport:
      type: object
      properties:
        attendanceDate:
          type: string
          format: date
        totalEmployees:
          type: integer
          format: int32
        present:
          type: integer
          format: int32
        absent:
          type: integer
          format: int32
        late:
          type: integer
          format: int32
        excused:
          type: integer
          format: int32
        attendanceRate:
          type: number
          format: float
        details:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeAttendanceListItem'