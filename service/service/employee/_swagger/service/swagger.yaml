openapi: 3.0.3
info:
  version: "1.0"
  title: "Employee Management"
  contact:
    email: "m.ehab.rabea@gmail.com"
    name: "Mohamed Ehab"

servers:
  - url: http://localhost:7002/

tags:
  - name: Employee
  - name: EmployeeContact
  - name: EmployeeAttendance
  - name: TrainerCourse
  - name: TrainerDepartment
  - name: Lookup

paths:

  /lookup/employee/attendance/status:
    get:
      tags:
        - Lookup
      summary: Retrieve All Employee Attendance Status (public)
      operationId: getAllEmployeeAttendanceStatusLookup
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/LookupResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /lookup/employee/types:
    get:
      tags:
        - Lookup
      summary: Retrieve All Employee Types (public)
      operationId: getAllEmployeeTypesLookup
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/LookupResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /lookup/employees:
    get:
      tags:
        - Lookup
      summary: Retrieve All Employees (public)
      operationId: getAllEmployeesLookup
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                   $ref: '#/components/schemas/EmployeeLookupVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /lookup/trainers:
    get:
      tags:
        - Lookup
      summary: Retrieve All Trainers (Employees with TRAINER type)
      operationId: getAllTrainersLookup
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/LookupResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees:
    post:
      tags:
        - Employee
      summary: Create employee
      operationId: createEmployee
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - Employee
      summary: Retrieve list of Employees
      operationId: getAllEmployees
      parameters:
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPQuickSearch'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPIsActive'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPCreatedOnFrom'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPCreatedOnTo'
        - $ref: '#/components/parameters/QPHireDateFrom'
        - $ref: '#/components/parameters/QPHireDateTo'
        - $ref: '#/components/parameters/QPGender'
        - $ref: '#/components/parameters/QPEmployeeType'
        - $ref: '#/components/parameters/QPSalaryType'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees/{employeeId}:
    put:
      tags:
        - Employee
      summary: Update Employee By Id
      operationId: updateEmployeeById
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - Employee
      summary: Retrieve employee
      operationId: getEmployee
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    delete:
      tags:
        - Employee
      summary: Delete employee (soft delete)
      operationId: deleteEmployee
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
      responses:
        '200':
          description: OK
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees/contacts:
    get:
      tags:
        - EmployeeContact
      summary: Retrieve list of employee contacts
      operationId: getAllEmployeeContacts
      parameters:
        - $ref: '#/components/parameters/QPEmployeeId'
        - $ref: '#/components/parameters/QPContactName'
        - $ref: '#/components/parameters/QPContactValue'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeContactResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees/{employeeId}/contacts:
    post:
      tags:
        - EmployeeContact
      summary: Create Employee Contact
      operationId: createEmployeeContact
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeContactDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees/{employeeId}/contacts/{contactId}:
    put:
      tags:
        - EmployeeContact
      summary: Update Employee Contact
      operationId: updateEmployeeContact
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
        - $ref: '#/components/parameters/PPContactId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeContactDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    delete:
      tags:
        - Employee Contact
      summary: Delete employee contact record
      operationId: deleteEmployeeContact
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
        - $ref: '#/components/parameters/PPContactId'
      responses:
        '200':
          description: OK
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees/{employeeId}/attendances:
    post:
      tags:
        - EmployeeAttendance
      summary: Create employee attendance record
      operationId: createEmployeeAttendance
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeAttendanceDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'
    get:
      tags:
        - EmployeeAttendance
      summary: Retrieve list of employee attendances
      operationId: getAllEmployeeAttendances
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
        - $ref: '#/components/parameters/QPEmployeeAttendanceStatus'
        - $ref: '#/components/parameters/QPAttendanceDateFrom'
        - $ref: '#/components/parameters/QPAttendanceDateTo'
        - $ref: '#/components/parameters/QPCheckInFrom'
        - $ref: '#/components/parameters/QPCheckInTo'
        - $ref: '#/components/parameters/QPCheckOutFrom'
        - $ref: '#/components/parameters/QPCheckOutTo'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAttendanceResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees/attendances:
    get:
      tags:
        - EmployeeAttendance
      summary: Retrieve list of employees attendances
      operationId: getAllEmployeesAttendances
      parameters:
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPQuickSearch'
        - $ref: '#/components/parameters/QPEmployeeId'
        - $ref: '#/components/parameters/QPEmployeeNationalId'
        - $ref: '#/components/parameters/QPEmployeeAttendanceStatus'
        - $ref: '#/components/parameters/QPAttendanceDateFrom'
        - $ref: '#/components/parameters/QPAttendanceDateTo'
        - $ref: '#/components/parameters/QPCheckInFrom'
        - $ref: '#/components/parameters/QPCheckInTo'
        - $ref: '#/components/parameters/QPCheckOutFrom'
        - $ref: '#/components/parameters/QPCheckOutTo'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAttendanceResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /employees/{employeeId}/attendances/{attendanceId}:
    put:
      tags:
        - EmployeeAttendance
      summary: Update employee attendance record
      operationId: updateEmployeeAttendance
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
        - $ref: '#/components/parameters/PPAttendanceId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeAttendanceDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - EmployeeAttendance
      summary: Retrieve employee attendance record
      operationId: getEmployeeAttendance
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
        - $ref: '#/components/parameters/PPAttendanceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAttendanceVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    delete:
      tags:
        - EmployeeAttendance
      summary: Delete employee attendance record
      operationId: deleteEmployeeAttendance
      parameters:
        - $ref: '#/components/parameters/PPEmployeeId'
        - $ref: '#/components/parameters/PPAttendanceId'
      responses:
        '200':
          description: OK
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /attendances/reports/daily:
    get:
      tags:
        - EmployeeAttendance
      summary: Get daily attendance report
      operationId: getDailyAttendanceReport
      parameters:
        - $ref: '#/components/parameters/QPAttendanceDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyAttendanceReport'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  # ==================== Trainer Course Endpoints ====================

  /trainers/departments:
    get:
      tags:
        - TrainerDepartment
      summary: Get all departments assigned to a trainer
      operationId: getTrainerDepartments
      parameters:
        - $ref: '#/components/parameters/QPTrainerId'
        - $ref: '#/components/parameters/QPDepartmentId'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPQuickSearch'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerDepartmentResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainers/{trainerId}/departments:
    post:
      tags:
        - TrainerDepartment
      summary: Assign a department to a trainer
      operationId: assignDepartmentToTrainer
      parameters:
        - $ref: '#/components/parameters/PPTrainerId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignDepartmentDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainers/{trainerdepartmentId}/departmnet:
    get:
      tags:
        - TrainerDepartment
      summary: Get trainer department details
      operationId: getTrainerDepartmentById
      parameters:
        - $ref: '#/components/parameters/PPTrainerDepartmentId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerDepartmentVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'
    put:
      tags:
        - TrainerDepartment
      summary: Update trainer department
      operationId: updateTrainerDepartment
      parameters:
        - $ref: '#/components/parameters/PPTrainerDepartmentId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignDepartmentDTO'
        required: true
      responses:
        '204':
          description: No Content
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    delete:
      tags:
        - TrainerDepartment
      summary: Unassign a department from a trainer
      operationId: unassignDepartmentFromTrainer
      parameters:
        - $ref: '#/components/parameters/PPTrainerDepartmentId'
      responses:
        '204':
          description: NO Content
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainers/courses:
    get:
      tags:
        - TrainerCourse
      summary: Get all courses assigned to a trainer
      operationId: getTrainerCourses
      parameters:
        - $ref: '#/components/parameters/QPTrainerId'
        - $ref: '#/components/parameters/QPCourseId'
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPQuickSearch'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerCourseResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainers/{trainerId}/courses:
    post:
      tags:
        - TrainerCourse
      summary: Assign a course to a trainer
      operationId: assignCourseToTrainer
      parameters:
        - $ref: '#/components/parameters/PPTrainerId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignCourseDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /trainers/{trainerCourseId}/course:
    delete:
      tags:
        - TrainerCourse
      summary: Unassign a course from a trainer
      operationId: unassignCourseFromTrainer
      parameters:
        - $ref: '#/components/parameters/PPTrainerCourseId'
      responses:
        '200':
          description: OK
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

#  /trainers/courses/assignments:
#    get:
#      tags:
#        - TrainerCourse
#      summary: Get all trainer-course assignments with filters
#      operationId: getAllTrainerCourseAssignments
#      parameters:
