#          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  # ==================== Course Session Endpoints ====================

  /courses/{courseId}/sessions:
    post:
      tags:
        - CourseSession
      summary: Create course session
      operationId: createCourseSession
      parameters:
        - $ref: '#/components/parameters/PPCourseId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseSessionDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/schemas/NewRecordVTO'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

    get:
      tags:
        - CourseSession
      summary: Get all course sessions by filter
      operationId: getAllCourseSessionsByFilter
      parameters:
        - $ref: '#/components/parameters/PPCourseId'
        - $ref: '#/components/parameters/QPTrainersId'
        - $ref: '#/components/parameters/QPSessionDay'
        - $ref: '#/components/parameters/QPSessionStatus'
        - $ref: '#/components/parameters/QPSessionDateFrom'
        - $ref: '#/components/parameters/QPSessionDateTo'
        - $ref: '#/components/parameters/QPStartTimeFrom'
        - $ref: '#/components/parameters/QPStartTimeTo'
        - $ref: '#/components/parameters/QPEndTimeFrom'
        - $ref: '#/components/parameters/QPEndTimeTo'

        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderDir'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPOrderBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseSessionResultSet'
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

  /courses/sessions:
    get:
      tags:
        - CourseSession
      summary: Get all course sessions across all courses with filters
      operationId: getAllSessionsByFilter
      parameters:
        - $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/parameters/QPQuickSearch'
        - $ref: '#/components/parameters/QPCourseId'
        - $ref: '#/components/parameters/QPSessionDay'
        - $ref: '#/components/parameters/QPTrainerId'
        - $ref: '#/components/parameters/QPTrainersId'
        - $ref: '#/components/parameters/QPPlaceId'
        - $ref: '#/components/parameters/QPSessionStatus'
        - $ref: '#/components/parameters/QPSessionDateFrom'
        - $ref: '#/components/parameters/QPSessionDateTo'
        - $ref: '#/components/parameters/QPStartTimeFrom'
        - $ref: '#/components/parameters/QPStartTimeTo'
        - $ref: '#/components/parameters/QPEndTimeFrom'
        - $ref: '#/components/parameters/QPEndTimeTo'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageNum'
        - $ref: '../../../../../lib/sql-db-adapter/_swagger/service/swagger.yaml#/components/parameters/QPPageSize'
