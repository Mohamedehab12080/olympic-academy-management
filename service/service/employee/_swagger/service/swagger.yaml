      operationId: deleteCourseSession
      parameters:
        - $ref: '#/components/parameters/PPCourseSessionId'
      responses:
        '200':
          description: OK
        '400':
          $ref: '../../../../../lib/common/_swagger/service/swagger.yaml#/components/responses/BadRequest'

