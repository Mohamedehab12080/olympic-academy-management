    # ==================== Enums ====================
    
    PaymentStatus:
      type: object
      properties:
        id:
          type: integer
          enum: [1, 2, 3]
        code:
          type: string
          enum: ["PAID", "PARTIAL", "UNPAID"]
        arabicLabel:
          type: string
          enum: ["مدفوع", "جزئي", "غير مدفوع"]

    RefundStatus:
      type: object
      properties:
        id:
          type: integer
          enum: [1, 2, 3, 4]
        code:
          type: string
          enum: ["PENDING", "APPROVED", "REJECTED", "COMPLETED"]
        arabicLabel:
          type: string
          enum: ["قيد الانتظار", "موافق عليه", "مرفوض", "مكتمل"]

    SalaryTransactionType:
      type: object
      properties:
        id:
          type: integer
          enum: [1, 2, 3, 4]
        code:
          type: string
          enum: ["SALARY", "INCENTIVE", "BONUS", "ADVANCE"]
        arabicLabel:
          type: string
          enum: ["راتب", "حافز", "مكافأة", "سلفة"]

    # ==================== DTOs ====================
    
    PaymentMethodDTO:
      type: object
      required:
        - title
      properties:
        title:
          type: string

    RentTypeDTO:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string

    ExpenseTypeDTO:
      type: object
      required:
