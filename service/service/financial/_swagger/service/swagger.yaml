        - placeId
        - payedAmount
        - rentAmount
        - paymentDate
      properties:
        placeId:
          type: integer
          format: int32
        rentAmount:
          type: integer
          format: int32
        payedAmount:
          type: integer
          format: int32
        remainedAmount:
          type: integer
          format: int32
        rentTypeId:
          type: integer
          format: int32
        paymentDate:
          type: string
          format: date
        paymentMethodId:
          type: integer
          format: int32

    ExpenseDTO:
      type: object
      required:
        - expenseDate
